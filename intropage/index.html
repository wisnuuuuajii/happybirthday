<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Deep background gradient layer -->
  <div class="bg-gradient"></div>

  <!-- Floating emoji -->
  <div class="bg-deco" style="left:8%;  animation-duration:13s; animation-delay:0s;">🎈</div>
  <div class="bg-deco" style="left:25%; animation-duration:10s; animation-delay:2s; font-size:36px;">⭐</div>
  <div class="bg-deco" style="left:52%; animation-duration:16s; animation-delay:4s; font-size:56px;">🎉</div>
  <div class="bg-deco" style="left:72%; animation-duration:12s; animation-delay:1s;">🎁</div>
  <div class="bg-deco" style="left:88%; animation-duration:9s;  animation-delay:3s; font-size:40px;">🎂</div>

  <div class="wrapper">

    <h1 class="title">Hey You 🫵</h1>
    <p class="subtitle">Someone has something special for you...</p>

    <div class="envelope-wrap">
      <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="body"></div>
        <div class="seal">🌟</div>
        <div class="paper" id="paper">
          <span class="paper-icon"></span>
          Click Here
        </div>
      </div>
    </div> 

    <p class="hint">click to open</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
